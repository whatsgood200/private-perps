[toolchain]
anchor_version = "0.30.1"

[features]
seeds      = false
skip-lint  = false

[programs.localnet]
private_perps = "5ZVFRvDMyq3ThqSEz7TxenA6mRasM7y3PK2efFRqKEYx"

[programs.devnet]
private_perps = "5ZVFRvDMyq3ThqSEz7TxenA6mRasM7y3PK2efFRqKEYx"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet  = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test.validator]
url = "https://api.devnet.solana.com"

# Arcium program accounts to clone from devnet for local testing
[[test.validator.clone]]
address = "Arc1umxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[workspace]
types = "target/types"

# Arcium.toml equivalent fields (used by arcium CLI)
[clusters.devnet]
offset = 456

[clusters.localnet]
offset = 0
